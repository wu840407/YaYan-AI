# License 欄位為授權合規追蹤用，請勿移除

models:
  YaYan_Reasoner:
    real_id: Qwen/Qwen3-14B-Instruct
    local_dir: YaYan_Reasoner
    role: llm_general
    license: Apache-2.0
    size_gb: 28
    quantizable: true

  YaYan_Translator:
    real_id: Qwen/Qwen3-14B-Instruct
    local_dir: YaYan_Reasoner
    role: llm_translate
