# YaYan-AI v4.5 主設定檔
# Quadro RTX 6000 (Turing 24GB) x 2 / Ubuntu 24.04
project:
  name: YaYan-AI
  version: "4.5.0"
  edition: "RTX6000-Server"

paths:
  models_root: /data/ai_models
  input_dir: /data/input_audio
  output_dir: /data/output_text
  cache_dir: /data/yayan_cache
  log_dir: /data/yayan_logs

devices:
  asr_gpu: "cuda:0"
  llm_gpu: "cuda:1"

audio:
  sample_rate: 16000
  vad_threshold: 0.5
  max_chunk_seconds: 30
  min_chunk_seconds: 0.5
  pad_seconds: 0.2

asr:
  enable_vad: true
  enable_lid: true
  enable_diarize: false
  default_alias: YaYan_ASR_Mandarin
  routing:
    zh: YaYan_ASR_Mandarin
    cmn: YaYan_ASR_Mandarin
    yue: YaYan_ASR_Mandarin
    wuu: YaYan_ASR_Mandarin
    cdo: YaYan_ASR_Mandarin
    bo: YaYan_ASR_Eastern
    ug: YaYan_ASR_Eastern
    fa: YaYan_ASR_Global
    ur: YaYan_ASR_Global
    en: YaYan_ASR_Global
    auto: YaYan_ASR_Mandarin

llm:
  alias: YaYan_Reasoner
  # 後端三選一：
  #   transformers - ★ 最穩、不需 JIT 編譯，當前 Turing 環境推薦
  #   vllm         - in-process，會獨佔 CUDA_VISIBLE_DEVICES（不建議）
  #   openai       - 由 start_server.sh 另起 vllm serve；需要 vllm 0.6.4.post1（單卡）
  backend: transformers

  model_id: Qwen/Qwen3-32B-AWQ
  quantization: awq                     # transformers 會從 config.json 自動偵測
  dtype: float16                        # Turing 不支援 bfloat16
  max_new_tokens: 1024
  max_model_len: 4096

  # 取樣
  do_sample: true
  temperature: 0.6
  top_p: 0.9
  top_k: 20
  repetition_penalty: 1.05

  # vllm in-process 專屬（backend != transformers 時才生效）
  gpu_memory_utilization: 0.85
  enforce_eager: true                   # Turing 必開
  tensor_parallel_size: 1               # 單卡，雙卡跑 ASR/LLM 隔離

  # openai backend 專屬
  openai_base_url: "http://127.0.0.1:8001/v1"
  served_model_name: "YaYan_Reasoner"

diarize:
  enabled: false
  min_speakers: 1
  max_speakers: 4

postprocess:
  use_opencc: true
  opencc_config: s2twp.json

server:
  host: 0.0.0.0
  port: 7860
  share: false
  show_internal_names: false

batch:
  watch_input: true
  poll_interval_seconds: 5
  parallel_workers: 1
  output_format: txt
  delete_after_process: false

logging:
  level: INFO
  redact_internal_names: true
