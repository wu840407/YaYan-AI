# YaYan-AI v4.6 主設定檔
project:
  name: YaYan-AI
  version: "4.6.0"
  edition: "RTX6000-Server"

paths:
  models_root: /data/ai_models
  input_dir: /data/input_audio
  output_dir: /data/output_text
  cache_dir: /data/yayan_cache
  log_dir: /data/yayan_logs

devices:
  asr_gpu: "cuda:0"
  llm_gpu: "cuda:1"

audio:
  sample_rate: 16000
  vad_threshold: 0.5
  max_chunk_seconds: 30
  min_chunk_seconds: 0.5
  pad_seconds: 0.2

asr:
  enable_vad: true
  enable_lid: true
  enable_diarize: true
  default_alias: YaYan_ASR_Dialect
  routing:
    # ── 漢語方言 → Dolphin-CN-Dialect ──
    zh: YaYan_ASR_Dialect
    cmn: YaYan_ASR_Dialect
    cmn-ne: YaYan_ASR_Dialect    # 東北話
    cmn-sd: YaYan_ASR_Dialect    # 山東話
    cmn-zy: YaYan_ASR_Dialect    # 河南話
    cmn-xa: YaYan_ASR_Dialect    # 西安話
    cmn-lz: YaYan_ASR_Dialect    # 蘭州話
    cmn-sw: YaYan_ASR_Dialect    # 四川話
    cmn-wh: YaYan_ASR_Dialect    # 武漢話
    cmn-jh: YaYan_ASR_Dialect    # 南京話
    yue: YaYan_ASR_Dialect       # 粵語
    wuu: YaYan_ASR_Dialect       # 吳語
    wuu-sz: YaYan_ASR_Dialect    # 蘇州話
    wuu-nb: YaYan_ASR_Dialect    # 寧波話
    wuu-wz: YaYan_ASR_Dialect    # 溫州話
    nan: YaYan_ASR_Dialect       # 閩南語
    nan-cs: YaYan_ASR_Dialect    # 潮汕話
    nan-hn: YaYan_ASR_Dialect    # 海南話
    cdo: YaYan_ASR_Dialect       # 福州話
    hak: YaYan_ASR_Dialect       # 客家話
    hsn: YaYan_ASR_Dialect       # 湘語
    gan: YaYan_ASR_Dialect       # 贛語
    cjy: YaYan_ASR_Dialect       # 晉語
    # 別名
    min: YaYan_ASR_Dialect
    hokkien: YaYan_ASR_Dialect
    # ── 藏維 ──
    bo: YaYan_ASR_Dialect
    ug: YaYan_ASR_Dialect
    # ── 日韓 → Whisper（在日韓上更強） ──
    ja: YaYan_ASR_Global
    ko: YaYan_ASR_Global
    # ── 中東/南亞 ──
    fa: YaYan_ASR_Global
    ur: YaYan_ASR_Global
    ar: YaYan_ASR_Global
    hi: YaYan_ASR_Global
    # ── 歐洲 ──
    en: YaYan_ASR_Global
    fr: YaYan_ASR_Global
    de: YaYan_ASR_Global
    ru: YaYan_ASR_Global
    es: YaYan_ASR_Global
    # ── 東南亞 ──
    th: YaYan_ASR_Global
    ms: YaYan_ASR_Global
    vi: YaYan_ASR_Global
    id: YaYan_ASR_Global
    # 預設
    auto: YaYan_ASR_Dialect

llm:
  alias: YaYan_Reasoner
  backend: transformers
  model_id: "Qwen/Qwen3-14B"
  quantization: nf4
  dtype: float16
  max_new_tokens: 1024
  max_model_len: 4096
  do_sample: true
  temperature: 0.6
  top_p: 0.9
  top_k: 20
  repetition_penalty: 1.05
  gpu_memory_utilization: 0.85
  enforce_eager: true
  tensor_parallel_size: 1
  openai_base_url: "http://127.0.0.1:8001/v1"
  served_model_name: "YaYan_Reasoner"

diarize:
  enabled: true
  min_speakers: 1
  max_speakers: 5

postprocess:
  use_opencc: true
  opencc_config: s2twp.json

server:
  host: 0.0.0.0
  port: 7860
  share: false
  show_internal_names: false

batch:
  watch_input: true
  poll_interval_seconds: 5
  parallel_workers: 1
  output_format: txt
  delete_after_process: false

logging:
  level: INFO
  redact_internal_names: true
