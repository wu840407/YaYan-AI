# YaYan-AI v4.6 主設定檔
project:
  name: YaYan-AI
  version: "4.6.0"
  edition: "RTX6000-Server"

paths:
  models_root: /data/ai_models
  input_dir: /data/input_audio
  output_dir: /data/output_text
  cache_dir: /data/yayan_cache
  log_dir: /data/yayan_logs

devices:
  asr_gpu: "cuda:0"
  llm_gpu: "cuda:1"

audio:
  sample_rate: 16000
  vad_threshold: 0.5
  max_chunk_seconds: 30
  min_chunk_seconds: 0.5
  pad_seconds: 0.2

asr:
  enable_vad: true
  enable_lid: true
  enable_diarize: true
  default_alias: YaYan_ASR_Dialect
  routing:
    zh: YaYan_ASR_Dialect
    cmn: YaYan_ASR_Dialect
    cmn-ne: YaYan_ASR_Dialect
    cmn-sd: YaYan_ASR_Dialect
    cmn-zy: YaYan_ASR_Dialect
    cmn-xa: YaYan_ASR_Dialect
    cmn-lz: YaYan_ASR_Dialect
    cmn-sw: YaYan_ASR_Dialect
    cmn-wh: YaYan_ASR_Dialect
    cmn-jh: YaYan_ASR_Dialect
    yue: YaYan_ASR_Dialect
    wuu: YaYan_ASR_Dialect
    wuu-sz: YaYan_ASR_Dialect
    wuu-nb: YaYan_ASR_Dialect
    wuu-wz: YaYan_ASR_Dialect
    nan: YaYan_ASR_Dialect
    nan-cs: YaYan_ASR_Dialect
    nan-hn: YaYan_ASR_Dialect
    cdo: YaYan_ASR_Dialect
    hak: YaYan_ASR_Dialect
    hsn: YaYan_ASR_Dialect
    gan: YaYan_ASR_Dialect
    cjy: YaYan_ASR_Dialect
    min: YaYan_ASR_Dialect
    hokkien: YaYan_ASR_Dialect
    bo: YaYan_ASR_Dialect
    ug: YaYan_ASR_Dialect
    ja: YaYan_ASR_Global
    ko: YaYan_ASR_Global
    fa: YaYan_ASR_Global
    ur: YaYan_ASR_Global
    ar: YaYan_ASR_Global
    hi: YaYan_ASR_Global
    en: YaYan_ASR_Global
    fr: YaYan_ASR_Global
    de: YaYan_ASR_Global
    ru: YaYan_ASR_Global
    es: YaYan_ASR_Global
    th: YaYan_ASR_Global
    ms: YaYan_ASR_Global
    vi: YaYan_ASR_Global
    id: YaYan_ASR_Global
    auto: YaYan_ASR_Dialect

llm:
  alias: YaYan_Reasoner
  backend: transformers
  model_id: "Qwen/Qwen3-14B"
  quantization: nf4
  dtype: float16
  max_new_tokens: 2048           # ★ 從 1024 提到 2048（每批 30 行夠用，且不會慢太多）
  max_model_len: 8192            # ★ 從 4096 提到 8192
  do_sample: true
  temperature: 0.6
  top_p: 0.9
  top_k: 20
  repetition_penalty: 1.05
  gpu_memory_utilization: 0.85
  enforce_eager: true
  tensor_parallel_size: 1
  openai_base_url: "http://127.0.0.1:8001/v1"
  served_model_name: "YaYan_Reasoner"

diarize:
  enabled: true
  min_speakers: 1
  max_speakers: 5

postprocess:
  use_opencc: true
  opencc_config: s2twp.json

server:
  host: 0.0.0.0
  port: 7860
  share: false
  show_internal_names: false

batch:
  watch_input: true
  poll_interval_seconds: 5
  parallel_workers: 1
  output_format: txt
  delete_after_process: false

logging:
  level: INFO
  redact_internal_names: true
