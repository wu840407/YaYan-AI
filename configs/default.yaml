# YaYan-AI v4.6 主設定檔
project:
  name: YaYan-AI
  version: "5.0.0"
  edition: "RTX6000-Server"

paths:
  models_root: /data/ai_models
  input_dir: /data/input_audio
  output_dir: /data/output_text
  cache_dir: /data/yayan_cache
  log_dir: /data/yayan_logs

devices:
  asr_gpu: "cuda:0"
  llm_gpu: "cuda:1"

audio:
  sample_rate: 16000
  vad_threshold: 0.5
  max_chunk_seconds: 30
  min_chunk_seconds: 0.5
  pad_seconds: 0.2

asr:
  enable_vad: true
  enable_lid: true
  enable_lid_context: true       # v4.7-A：逐段 LID 借前後 context（短段信心提升）
  lid_context_sec: 1.5           # v4.7-A：LID 時前後各向完整音檔借的秒數
  enable_lid_ensemble: false     # v4.7-B：VoxLingua107 + Whisper LID 投票（預設關，待 baseline 驗證後再開）
  enable_taigi_asr: true         # v4.7-C：台語(nan)改走專用 Breeze-ASR-26（已離線放入權重並驗證；缺失自動退回 Dolphin）
  taigi_routings: [nan, nan-cs, nan-hn]   # v4.7-C：觸發台語專用 ASR 的 routing key
  enable_diarize: true
  default_alias: YaYan_ASR_Dialect
  routing:
    zh: YaYan_ASR_Dialect
    cmn: YaYan_ASR_Dialect
    cmn-ne: YaYan_ASR_Dialect
    cmn-sd: YaYan_ASR_Dialect
    cmn-zy: YaYan_ASR_Dialect
    cmn-xa: YaYan_ASR_Dialect
    cmn-lz: YaYan_ASR_Dialect
    cmn-sw: YaYan_ASR_Dialect
    cmn-wh: YaYan_ASR_Dialect
    cmn-jh: YaYan_ASR_Dialect
    yue: YaYan_ASR_Dialect
    wuu: YaYan_ASR_Dialect
    wuu-sz: YaYan_ASR_Dialect
    wuu-nb: YaYan_ASR_Dialect
    wuu-wz: YaYan_ASR_Dialect
    nan: YaYan_ASR_Dialect
    nan-cs: YaYan_ASR_Dialect
    nan-hn: YaYan_ASR_Dialect
    cdo: YaYan_ASR_Dialect
    hak: YaYan_ASR_Dialect
    hsn: YaYan_ASR_Dialect
    gan: YaYan_ASR_Dialect
    cjy: YaYan_ASR_Dialect
    min: YaYan_ASR_Dialect
    hokkien: YaYan_ASR_Dialect
    bo: YaYan_ASR_Dialect
    ug: YaYan_ASR_Dialect
    ja: YaYan_ASR_Global
    ko: YaYan_ASR_Global
    fa: YaYan_ASR_Global
    ur: YaYan_ASR_Global
    ar: YaYan_ASR_Global
    hi: YaYan_ASR_Global
    en: YaYan_ASR_Global
    fr: YaYan_ASR_Global
    de: YaYan_ASR_Global
    ru: YaYan_ASR_Global
    es: YaYan_ASR_Global
    th: YaYan_ASR_Global
    ms: YaYan_ASR_Global
    vi: YaYan_ASR_Global
    id: YaYan_ASR_Global
    auto: YaYan_ASR_Dialect

llm:
  alias: YaYan_Reasoner
  backend: transformers
  model_id: "Qwen/Qwen3-14B"
  quantization: nf4
  dtype: float16
  max_new_tokens: 2048           # ★ 從 1024 提到 2048（每批 30 行夠用，且不會慢太多）
  max_model_len: 8192            # ★ 從 4096 提到 8192
  do_sample: true
  temperature: 0.6
  top_p: 0.9
  top_k: 20
  repetition_penalty: 1.05
  gpu_memory_utilization: 0.85
  enforce_eager: true
  tensor_parallel_size: 1
  openai_base_url: "http://127.0.0.1:8001/v1"
  served_model_name: "YaYan_Reasoner"

diarize:
  enabled: true
  min_speakers: 1
  max_speakers: 5

# V5.0 M2：聲紋語者識別（預設關，不影響現有 A/B/C 行為）
speaker_id:
  enable_speaker_id: false         # ★ 預設 false：轉錄時不做自動識別，行為與 v4.7 完全相同
  embedding_dim: 256               # wespeaker resnet34 實測維度（建表 vector(N) 用）
  db:
    host: localhost
    port: 5432
    dbname: yayan_voiceprint
    user: yayan
    password_env: YAYAN_VP_DB_PASSWORD   # ★ 實際密碼一律走此環境變數（勿把密碼寫進本檔）
    password_default: ""                 # 不存實密於 git；本機/正式皆 export YAYAN_VP_DB_PASSWORD
  threshold_high: 0.70             # similarity ≥ → 標姓名 [張三 ...]
  threshold_mid: 0.55              # similarity ≥ → 標「疑似_張三(0.65)」，以下退回 A方
  top_k: 5                         # 相似度搜尋取前 k 筆
  hnsw_ef_search: 100              # HNSW 查詢 ef_search（越大越準越慢）
  enroll_unknown: true             # 辨識不出時自動建「未知語者_時間戳」待命名

postprocess:
  use_opencc: true
  opencc_config: s2twp.json

server:
  host: 127.0.0.1          # 只聽 localhost：外部一律走 Nginx 443 HTTPS，封死 7860 直連
  port: 7860
  share: false
  show_internal_names: false

batch:
  watch_input: true
  poll_interval_seconds: 5
  parallel_workers: 1
  output_format: txt
  delete_after_process: false

logging:
  level: INFO
  redact_internal_names: true
