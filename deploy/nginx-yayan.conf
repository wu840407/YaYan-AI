# /etc/nginx/sites-available/yayan
#
# 反向代理 HTTPS 443 → 內部 7860 (Gradio)
# 用 AD CA 簽的憑證

upstream gradio_backend {
    server 127.0.0.1:7860;
    keepalive 32;
}

# HTTP → HTTPS 強制跳轉
server {
    listen 80;
    listen [::]:80;
    server_name your-server.example.com _;   # 部署時改成實際主機名
    return 301 https://$host$request_uri;
}

server {
    # Ubuntu 24.04 內建 Nginx 1.24，HTTP/2 用 listen 參數舊語法
    # （http2 on; 是 1.25.1+ 才支援，會 emerg "unknown directive http2"）
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-server.example.com _;   # 部署時改成實際主機名

    # ── AD CA 簽的憑證 ──
    ssl_certificate     /etc/nginx/ssl/your-server-fullchain.crt;
    ssl_certificate_key /etc/nginx/ssl/your-server.key;

    # ── TLS 安全設定 ──
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── 上傳大型音檔（最多 500MB）──
    client_max_body_size 500M;
    client_body_timeout 600s;
    client_header_timeout 60s;

    # ── 大型音檔處理可能 > 5 分鐘 ──
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
    proxy_connect_timeout 60s;

    # ── log ──
    access_log /var/log/nginx/yayan-access.log;
    error_log  /var/log/nginx/yayan-error.log warn;

    # ── Gradio Web UI + WebSocket ──
    location / {
        proxy_pass http://gradio_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_buffering off;

        # Gradio 長連線 SSE event stream
        proxy_set_header Cache-Control no-cache;
    }

    # Gradio queue / SSE endpoint
    location /queue/ {
        proxy_pass http://gradio_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }
}
